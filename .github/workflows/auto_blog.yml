name: Auto Blog Generation

on:
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Pipeline mode"
        type: choice
        options:
          - recent
          - high-intent
        default: recent
  schedule:
    # 10:00 KST
    - cron: "0 1 * * *"
    # 17:00 KST
    - cron: "0 8 * * *"
    # 11:00 KST (high-intent)
    - cron: "0 2 * * *"

concurrency:
  group: ai-blog-auto
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AI repo
        uses: actions/checkout@v4

      - name: Checkout Astro repo
        uses: actions/checkout@v4
        with:
          repository: Ahn-Hyun/ai-blog-V1
          token: ${{ secrets.ASTRO_REPO_TOKEN }}
          path: ai_blog_v1_astro
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Resolve pipeline
        id: pipeline
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pipeline=${{ github.event.inputs.pipeline }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.schedule }}" = "0 2 * * *" ]; then
            echo "pipeline=high-intent" >> "$GITHUB_OUTPUT"
          else
            echo "pipeline=recent" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate posts
        env:
          ASTRO_ROOT: ${{ github.workspace }}/ai_blog_v1_astro
          STATE_PATH: ${{ github.workspace }}/ai_blog_v1_astro/.ai_state/published.json
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          POST_DRAFT: "false"
        run: |
          python scripts/auto_blog.py --once --pipeline "${{ steps.pipeline.outputs.pipeline }}"

      - name: Commit and push to Astro repo
        run: |
          cd ai_blog_v1_astro
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto: publish blog updates"
          git push
